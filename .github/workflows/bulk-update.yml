name: Bulk Update All Instances

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target instance name (empty = all instances)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Dry run (no actual changes)"
        required: false
        default: false
        type: boolean

jobs:
  bulk-update-estack-ai:
    runs-on: ubuntu-latest
    if: inputs.target == '' || contains(fromJSON('["mell-dev","central-hd-osada-agent"]'), inputs.target)
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_ESTACK_AI }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/pinecone-client
      - run: npm run build -w packages/migrate-memory
      - name: Run bulk-update (estack-ai-agent org)
        env:
          TARGET: ${{ inputs.target }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          DRY_RUN_FLAG=""
          if [ "$DRY_RUN" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          for instance in mell-dev central-hd-osada-agent; do
            if [ -z "$TARGET" ] || [ "$TARGET" = "$instance" ]; then
              echo "=== Updating $instance ==="
              npx tsx packages/migrate-memory/dist/cli.js bulk-update --target="$instance" $DRY_RUN_FLAG
            fi
          done

  bulk-update-estack-inc:
    runs-on: ubuntu-latest
    if: inputs.target == '' || contains(fromJSON('["mino-openclaw","buzz-openclaw","umito-openclaw","estack-soumu-openclaw"]'), inputs.target)
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_ESTACK_INC }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/pinecone-client
      - run: npm run build -w packages/migrate-memory
      - name: Run bulk-update (estack-inc org)
        env:
          TARGET: ${{ inputs.target }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          DRY_RUN_FLAG=""
          if [ "$DRY_RUN" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          for instance in mino-openclaw buzz-openclaw umito-openclaw estack-soumu-openclaw; do
            if [ -z "$TARGET" ] || [ "$TARGET" = "$instance" ]; then
              echo "=== Updating $instance ==="
              npx tsx packages/migrate-memory/dist/cli.js bulk-update --target="$instance" $DRY_RUN_FLAG
            fi
          done
