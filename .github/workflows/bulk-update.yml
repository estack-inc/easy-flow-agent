name: Bulk Update All Instances

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target instance name (empty = all instances)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Dry run (no actual changes)"
        required: false
        default: false
        type: boolean

jobs:
  bulk-update-estack-ai:
    runs-on: ubuntu-latest
    if: inputs.target == '' || contains(fromJSON('["mell-dev","central-hd-osada-agent"]'), inputs.target)
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_ESTACK_AI }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/migrate-memory
      - name: Run bulk-update
        run: |
          TARGET_FLAG=""
          if [ -n "${{ inputs.target }}" ]; then
            TARGET_FLAG="--target=${{ inputs.target }}"
          fi
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          node packages/migrate-memory/dist/cli.js bulk-update $TARGET_FLAG $DRY_RUN_FLAG

  bulk-update-estack-inc:
    runs-on: ubuntu-latest
    if: inputs.target == '' || contains(fromJSON('["mino-openclaw","buzz-openclaw","umito-openclaw","estack-soumu-openclaw"]'), inputs.target)
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_ESTACK_INC }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/migrate-memory
      - name: Run bulk-update
        run: |
          TARGET_FLAG=""
          if [ -n "${{ inputs.target }}" ]; then
            TARGET_FLAG="--target=${{ inputs.target }}"
          fi
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          node packages/migrate-memory/dist/cli.js bulk-update $TARGET_FLAG $DRY_RUN_FLAG
