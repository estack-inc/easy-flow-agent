name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    branches: [main]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read

jobs:
  wait-for-ci:
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Wait for CI workflow to complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          REPO="${{ github.repository }}"
          echo "Waiting for CI on $SHA ..."

          for i in $(seq 1 90); do
            # Get CI workflow run for this SHA
            RUN=$(gh api "repos/$REPO/actions/workflows/ci.yml/runs?head_sha=$SHA&per_page=1" \
              --jq '.workflow_runs[0] | "\(.status):\(.conclusion // "pending")"' 2>/dev/null || echo "")

            if [ -z "$RUN" ]; then
              echo "  [$i] CI run not found yet..."
              sleep 10
              continue
            fi

            echo "  [$i] CI: $RUN"
            case "$RUN" in
              completed:success)
                echo "CI passed!"
                exit 0
                ;;
              completed:*)
                echo "CI failed: $RUN"
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for CI"
          exit 1

  claude-review:
    needs: [wait-for-ci]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check if target files changed
        id: check_files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGED=$(gh pr diff ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} --name-only | \
            grep -cE '^packages/.*\.(ts|js|json)$|^specs/.*\.md$|^\.github/workflows/.*\.(yml|yaml)$|^CLAUDE\.md$' || echo "0")
          if [ "$CHANGED" -eq 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No target files changed"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Target files changed: $CHANGED"
          fi

      - name: Checkout repository
        if: steps.check_files.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude_review
        if: steps.check_files.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.AI_REVIEWER_TOKEN || secrets.GITHUB_TOKEN }}
          track_progress: false
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            あなたは Easy Flow Agent プロジェクトのシニアコードレビュアーです。

            ## ⚠️ CRITICAL INSTRUCTION — 最重要

            **レビュー中は一切 GitHub へ投稿・コメントしてはならない。**
            `gh pr comment`、`gh pr review`、インラインコメント等、GitHub への直接投稿は絶対禁止。

            全ての調査・分析が完了した後、**最後に 1 回だけ** `/tmp/review-result.md` に Write ツールで書き出すこと。
            途中経過・部分結果のファイル書き込みも禁止。後続ステップがこのファイルを一括で PR コメントとして投稿する。

            ## レビュー手順（Step 1〜5 を順番に実行、全て完了してから出力）

            ### Step 1: PR と要件の把握
            ```
            gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }}
            ```
            - PR title・description・チェックリストを確認
            - `## AIレビュースキップ理由` セクションがあれば内容を記録する

            ### Step 2: 変更内容の把握
            ```
            gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }}
            ```

            ### Step 3: プロジェクト仕様の理解
            - CLAUDE.md を読んでプロジェクト規約を確認
            - 変更に関連する specs/*.md があれば読む

            ### Step 4: 影響範囲の調査
            - 変更されたファイルを全て読み込む
            - インポートされているクラス・インターフェース・親クラスを確認
            - Grep で関連する呼び出し元・実装クラスを検索
            - 対応するテストファイルを確認

            ### Step 5: チェック項目の評価

            #### [A] 要件充足・影響範囲
            - PR description に記載された要件が全て実装されているか
            - メソッド名・シグネチャ変更時: 全呼び出し元が更新されているか
            - インターフェース変更時: 全実装クラスが更新されているか
            - 新機能追加時: 対応するテストが存在するか

            #### [B] コード品質（CLAUDE.md 参照）
            - 型安全性（TypeScript strict モード準拠）
            - ESM モジュール規約（import パスに `.js` 拡張子）
            - JSON 永続化互換性（`Set` 不使用等）
            - テスト（Vitest、十分なカバレッジ）
            - アーキテクチャ（モノレポ構成、パッケージ間依存の妥当性）

            #### [C] セキュリティ
            - console.log/debugger が残っていないか
            - 機密情報（API キー等）がハードコードされていないか
            - 入力値のバリデーション

            #### [D] GitHub Actions 品質（yml 変更時）
            - 構文・secrets 参照・パーミッション設定の妥当性

            ## 重要度分類（2 段階のみ）

            - 🔴 **重大**: バグ、セキュリティ脆弱性、データ損失リスク、要件未充足（**スキップ不可**）
            - 🟡 **要修正**: コード品質問題、テスト不足、型安全性違反、推奨事項、スタイル提案（**合理的理由があれば PR 説明欄でスキップ可能**）

            ※ 旧「情報提供（🔵）」カテゴリは廃止。推奨事項・スタイル提案も 🟡 として扱う。

            ## スキップ判定

            Step 1 で取得した PR body に `## AIレビュースキップ理由` セクションがある場合:
            - 各 🟡 指摘について、対応するスキップ理由が記載されているか照合する
            - 対応するスキップ理由が記載されている 🟡 指摘 → `🟡 (スキップ済)` として扱い、verdict に影響しない
            - スキップ理由が不明確・不合理な場合は通常の 🟡 として扱う

            ## レビュー判定ルール

            **🔴 指摘が 1 件でもある場合（スキップ不可）:**
            → `### レビュー結果: ❌ Changes Requested`

            **スキップされていない 🟡 指摘が 1 件でもある場合:**
            → `### レビュー結果: ❌ Changes Requested`

            **全ての 🟡 がスキップ済み、または指摘なしの場合:**
            → `### レビュー結果: ✅ Approved`

            **重要: `gh pr review` コマンドは実行しないこと。** レビュー判定の提出は後続ステップが自動で行う。

            ## 出力手順（全 Step 完了後に 1 回だけ実行）

            Step 1〜5 の全てが完了し、全指摘事項が確定したら、以下のテンプレートに従い
            `/tmp/review-result.md` を Write ツールで **1 回だけ** 書き出すこと。
            書き出し後の追記・上書きは禁止。

            ```markdown
            ### 変更の概要

            （変更内容の要約を 1〜3 文で記載）

            ### チェック結果

            （各ファイルの確認結果を記載。問題がなければその旨を簡潔に）

            **`path/to/file.ts`**
            - 確認内容と結果

            ### 指摘事項

            （指摘がない場合は「指摘事項なし。」と記載）

            🔴 **重大: タイトル** (`path/to/file.ts:行番号`)
            > 説明と修正案

            🟡 **要修正: タイトル** (`path/to/file.ts:行番号`)
            > 説明と修正案
            > 💡 スキップする場合: PR 説明欄の `## AIレビュースキップ理由` セクションに理由を記載してください

            🟡 **要修正（スキップ済）: タイトル** (`path/to/file.ts:行番号`)
            > 説明
            > ✓ スキップ理由: [PR に記載された理由]

            ### レビュー結果: ✅ Approved
            ```
            または
            ```markdown
            ### レビュー結果: ❌ Changes Requested
            ```

            ## レビュー方針
            - 確信がない指摘は避け、確実な問題のみ指摘する
            - 修正漏れの検出を最優先で行う
            - 指摘にはファイルパスと行番号を必ず含める（`path/to/file.ts:42` 形式）
            - **網羅性の確保**: 全ファイルのレビューを完了した後、以下のチェックリストで見落としがないか自己検証すること:
              1. 全ての変更ファイルに目を通したか？
              2. 各ファイルのインポート先・呼び出し元を確認したか？
              3. テストカバレッジの漏れはないか？
              4. パッケージ間の整合性（依存宣言、バージョン、export パターン）を確認したか？

          claude_args: |
            --model ${{ vars.AI_REVIEW_MODEL || 'sonnet' }}
            --allowedTools "Write,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(grep:*),Bash(find:*),Bash(rg:*),Bash(cat:*),Bash(wc:*),Read,Glob,Grep"

      - name: Post review comment
        if: steps.check_files.outputs.skip != 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.AI_REVIEWER_TOKEN || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          if [ ! -f /tmp/review-result.md ] || [ ! -s /tmp/review-result.md ]; then
            echo "::error::Review result file not found or empty — Claude may not have completed the review"
            exit 1
          fi
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file /tmp/review-result.md

      - name: Submit review verdict
        if: >
          !cancelled() &&
          steps.check_files.outputs.skip != 'true' &&
          steps.claude_review.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.AI_REVIEWER_TOKEN || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          if [ ! -f /tmp/review-result.md ]; then
            echo "::warning::Review result file not found — skipping verdict submission"
            exit 0
          fi

          VERDICT=$(grep -E '^### (判定|レビュー結果):' /tmp/review-result.md | head -1 | \
            sed 's/.*: //' | cut -c1-50)

          echo "Verdict line: $VERDICT"
          if echo "$VERDICT" | grep -qiE 'CHANGES_REQUESTED|Changes Requested|要修正'; then
            echo "Submitting CHANGES_REQUESTED review"
            gh pr review "$PR_NUMBER" --repo "$REPO" --request-changes \
              --body "🤖 AIレビュー判定: CHANGES_REQUESTED — 詳細はレビューコメントを確認してください。"
          elif echo "$VERDICT" | grep -qiE 'APPROVED|APPROVE|Approved'; then
            echo "Submitting APPROVED review"
            gh pr review "$PR_NUMBER" --repo "$REPO" --approve \
              --body "🤖 AIレビュー判定: APPROVED ✅"
          else
            echo "Could not determine verdict from: $VERDICT"
            echo "Skipping review submission"
          fi

      - name: Notify Slack on Failure
        if: failure() && steps.check_files.outputs.skip != 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BRANCH: ${{ github.head_ref }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not set, skipping notification"
            exit 0
          fi
          payload=$(jq -n \
            --arg title "$PR_TITLE" \
            --arg url "$PR_URL" \
            --arg number "$PR_NUMBER" \
            --arg author "$PR_AUTHOR" \
            --arg branch "$BRANCH" \
            '{text: ":warning: *AI Code Review Failed*\n<\($url)|PR #\($number)>: \($title)\nAuthor: \($author) | Branch: `\($branch)`"}')
          curl -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
