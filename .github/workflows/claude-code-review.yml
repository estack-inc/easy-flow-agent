name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  id-token: write
  actions: read

jobs:
  wait-for-ci:
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Wait for CI workflow to complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          REPO="${{ github.repository }}"
          echo "Waiting for CI on $SHA ..."

          for i in $(seq 1 90); do
            # Get CI workflow run for this SHA
            RUN=$(gh api "repos/$REPO/actions/workflows/ci.yml/runs?head_sha=$SHA&per_page=1" \
              --jq '.workflow_runs[0] | "\(.status):\(.conclusion // "pending")"' 2>/dev/null || echo "")

            if [ -z "$RUN" ]; then
              echo "  [$i] CI run not found yet..."
              sleep 10
              continue
            fi

            echo "  [$i] CI: $RUN"
            case "$RUN" in
              completed:success)
                echo "CI passed!"
                exit 0
                ;;
              completed:*)
                echo "CI failed: $RUN"
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for CI"
          exit 1

  claude-review:
    needs: [wait-for-ci]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check if target files changed
        id: check_files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGED=$(gh pr diff ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} --name-only | \
            grep -cE '^packages/.*\.(ts|js|json)$|^specs/.*\.md$|^\.github/workflows/.*\.(yml|yaml)$|^CLAUDE\.md$' || echo "0")
          if [ "$CHANGED" -eq 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No target files changed"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Target files changed: $CHANGED"
          fi

      - name: Checkout repository
        if: steps.check_files.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude_review
        if: steps.check_files.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.AI_REVIEWER_TOKEN || secrets.GITHUB_TOKEN }}
          track_progress: false
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            あなたは Easy Flow Agent プロジェクトのシニアコードレビュアーです。

            ## 出力ルール（最重要）

            **レビュー中に GitHub へコメントを投稿してはならない。**
            `gh pr comment` やインラインコメント等、GitHub への直接投稿は一切禁止。

            全ての分析が完了した後、レビュー結果を `/tmp/review-result.md` に Write ツールで書き出すこと。
            後続ステップがこのファイルを読み取り、一括で PR コメントとして投稿する。

            ## レビュー手順

            1. **CLAUDE.md と specs/*.md を読んでプロジェクト仕様を理解する**
            2. 変更されたファイルの全体を読み込み、変更の目的と影響範囲を理解する
            3. インポートされているクラス・インターフェース、親クラス・実装インターフェースを確認する
            4. 関連するテストファイルを探索する

            ## 必須チェック項目

            ### 要件充足・影響範囲
            - PR description に記載された要件が全て実装されているか
            - 変更が他の機能に影響を与えていないか（Grep で関連箇所を検索）
            - メソッド名・シグネチャ変更時: 全呼び出し元が更新されているか
            - インターフェース変更時: 全実装クラスが更新されているか
            - 新機能追加時: 対応するテストが存在するか

            ### コード品質（CLAUDE.md 参照）
            - 型安全性（TypeScript strict モード準拠）
            - ESM モジュール規約（import パスに `.js` 拡張子）
            - JSON 永続化互換性（`Set` 不使用等）
            - テスト（Vitest、十分なカバレッジ）
            - アーキテクチャ（モノレポ構成、パッケージ間依存の妥当性）

            ### セキュリティ
            - console.log/debugger が残っていないか
            - 機密情報（API キー等）がハードコードされていないか
            - 入力値のバリデーション

            ## 指摘の重要度分類（厳守）

            指摘は以下の3段階で分類すること:

            - 🔴 **重大**: バグ、セキュリティ脆弱性、データ損失リスク、要件未充足
            - 🟡 **要修正**: コード品質上の問題、パフォーマンス懸念、テスト不足、型安全性違反
            - 🔵 **情報提供**: 推奨事項、スタイル提案、リファクタリング案（対応任意）

            ## レビュー判定ルール（厳守）

            レビュー完了時、以下のルールに従って判定すること:

            **🔴 または 🟡 の指摘が1件でもある場合:**
            → `### レビュー結果: ❌ Changes Requested` と記載する

            **🔵 のみ、または指摘なしの場合:**
            → `### レビュー結果: ✅ Approved` と記載する

            **重要: `gh pr review` コマンドは実行しないこと。** レビュー判定の提出は後続ステップが自動で行う。

            ## `/tmp/review-result.md` の出力フォーマット

            以下のテンプレートに従って記載すること:

            ```markdown
            ### 変更の概要

            （変更内容の要約を1〜3文で記載）

            ### チェック結果

            （各ファイルの確認結果を記載。問題がなければその旨を簡潔に）

            **`path/to/file.ts`**
            - 確認内容と結果

            ### 指摘事項

            （指摘がない場合は「指摘事項なし。」と記載）

            🔴 **重大: タイトル** (`path/to/file.ts:行番号`)
            > 説明と修正案

            🟡 **要修正: タイトル** (`path/to/file.ts:行番号`)
            > 説明と修正案

            🔵 **情報提供: タイトル** (`path/to/file.ts:行番号`)
            > 説明

            ### レビュー結果: ✅ Approved / ❌ Changes Requested
            ```

            ## レビュー方針
            - 確信がない指摘は避け、確実な問題のみ指摘する
            - 修正漏れの検出を最優先で行う
            - 指摘にはファイルパスと行番号を必ず含める（`path/to/file.ts:42` 形式）
            - **網羅性の確保**: 全ファイルのレビューを完了した後、以下のチェックリストで見落としがないか自己検証すること:
              1. 全ての変更ファイルに目を通したか？
              2. 各ファイルのインポート先・呼び出し元を確認したか？
              3. テストカバレッジの漏れはないか？
              4. パッケージ間の整合性（依存宣言、バージョン、export パターン）を確認したか？

          claude_args: |
            --model ${{ vars.AI_REVIEW_MODEL || 'sonnet' }}
            --allowedTools "Write,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(grep:*),Bash(find:*),Bash(rg:*),Bash(cat:*),Bash(wc:*),Read,Glob,Grep"

      - name: Post review comment
        if: steps.check_files.outputs.skip != 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.AI_REVIEWER_TOKEN || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          if [ ! -f /tmp/review-result.md ]; then
            echo "::warning::Review result file not found"
            exit 1
          fi
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file /tmp/review-result.md

      - name: Submit review verdict
        if: >
          !cancelled() &&
          steps.check_files.outputs.skip != 'true' &&
          steps.claude_review.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.AI_REVIEWER_TOKEN || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          if [ ! -f /tmp/review-result.md ]; then
            echo "::warning::Review result file not found — skipping verdict submission"
            exit 0
          fi

          VERDICT=$(grep -E '^### (判定|レビュー結果):' /tmp/review-result.md | head -1 | \
            sed 's/.*: //' | cut -c1-50)

          echo "Verdict line: $VERDICT"
          if echo "$VERDICT" | grep -qiE 'CHANGES_REQUESTED|Changes Requested|要修正'; then
            echo "Submitting CHANGES_REQUESTED review"
            gh pr review "$PR_NUMBER" --repo "$REPO" --request-changes \
              --body "🤖 AIレビュー判定: CHANGES_REQUESTED — 詳細はレビューコメントを確認してください。"
          elif echo "$VERDICT" | grep -qiE 'APPROVED|APPROVE|Approved'; then
            echo "Submitting APPROVED review"
            gh pr review "$PR_NUMBER" --repo "$REPO" --approve \
              --body "🤖 AIレビュー判定: APPROVED ✅"
          else
            echo "Could not determine verdict from: $VERDICT"
            echo "Skipping review submission"
          fi
