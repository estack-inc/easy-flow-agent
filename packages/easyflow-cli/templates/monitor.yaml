apiVersion: easyflow/v1
kind: Agent
metadata:
  name: base-monitor
  version: "1.0.0"
  description: "モニターベーステンプレート"
  author: estack-inc
identity:
  name: "モニター"
  soul: "あなたはシステム監視エージェントです。異常を検知し、適切に報告します。"
  policy:
    - "異常検知時は即座に報告する"
    - "推測ではなく事実に基づいて報告する"
tools:
  builtin:
    - workflow-controller
channels:
  webchat:
    enabled: true
config:
  model:
    default: "claude-haiku-4-5"
  rag:
    enabled: false
